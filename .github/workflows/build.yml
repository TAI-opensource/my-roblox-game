name: Build Game

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Install roblox-ts
        run: npm install -g roblox-ts

      - name: Compile TypeScript to Luau
        run: rbxtsc

      - name: Download Rojo (Linux)
        run: |
          curl -L -o rojo-linux.zip https://github.com/rojo-rbx/rojo/releases/download/v7.7.0/rojo-7.7.0-linux-x86_64.zip
          unzip rojo-linux.zip -d rojo-linux
          chmod +x rojo-linux/rojo

      - name: Download Rojo (Windows)
        run: |
          curl -L -o rojo-windows.zip https://github.com/rojo-rbx/rojo/releases/download/v7.7.0/rojo-7.7.0-windows-x86_64.zip
          unzip rojo-windows.zip -d rojo-windows

      - name: Create start script (Linux)
        run: |
          cat > start.sh << 'EOF'
          #!/bin/bash
          echo "=== My Roblox Game ==="
          echo ""
          echo "Iniciando Rojo server..."
          echo "Abra o Roblox Studio e clique Connect no plugin Rojo"
          echo ""
          ./rojo-linux/rojo serve
          EOF
          chmod +x start.sh

      - name: Create start script (Windows)
        run: |
          cat > start.bat << 'EOF'
          @echo off
          echo === My Roblox Game ===
          echo.
          echo Iniciando Rojo server...
          echo Abra o Roblox Studio e clique Connect no plugin Rojo
          echo.
          rojo-windows\rojo.exe serve
          pause
          EOF

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-build
          path: |
            out/
            include/
            rojo-linux/
            rojo-windows/
            start.sh
            start.bat
            default.project.json
          retention-days: 30
